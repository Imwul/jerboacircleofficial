<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Scintilla Animae poster</title>
  <desc id="desc">A stark parchment and black typographic poster for Scintilla Animae.</desc>
  <rect width="1200" height="1600" fill="#e8ddc8"/>
  <rect x="54" y="54" width="1092" height="1492" fill="none" stroke="#15120f" stroke-width="10"/>
  <rect x="92" y="92" width="1016" height="1416" fill="none" stroke="#7b241d" stroke-width="3"/>
  <path d="M600 166 C640 240 696 286 774 306 C694 328 638 380 600 462 C562 380 506 328 426 306 C504 286 560 240 600 166Z" fill="#15120f"/>
  <text x="600" y="606" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="112" fill="#15120f" letter-spacing="4">SCINTILLA</text>
  <text x="600" y="728" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="112" fill="#15120f" letter-spacing="4">ANIMAE</text>
  <line x1="142" y1="826" x2="1058" y2="826" stroke="#15120f" stroke-width="5"/>
  <text x="600" y="920" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#7b241d" letter-spacing="14">GRAIL / FOREST / RELIC</text>
  <text x="600" y="984" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#7b241d" letter-spacing="14">ROSE / FIRE / STAR</text>
  <g fill="#15120f" font-family="Georgia, 'Times New Roman', serif" font-size="72">
    <text x="164" y="1190">I</text>
    <text x="316" y="1190">II</text>
    <text x="492" y="1190">III</text>
    <text x="684" y="1190">IV</text>
    <text x="858" y="1190">V</text>
    <text x="1008" y="1190">VI</text>
  </g>
  <text x="600" y="1370" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#15120f" letter-spacing="12">JERBOA CIRCLE</text>
  <text x="600" y="1424" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#15120f" letter-spacing="8">CURRENT PROGRAM</text>
</svg>
